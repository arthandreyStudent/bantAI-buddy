# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - BantAI-Buddy-Alert-Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
        working-directory: ./bantAI-backend

      - name: Validate backend runtime configuration
        run: npm run validate:config
        working-directory: ./bantAI-backend
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_ENDPOINT: ${{ secrets.GEMINI_ENDPOINT }}
          GEMINI_SAFETY_THRESHOLD: ${{ secrets.GEMINI_SAFETY_THRESHOLD }}
          ACS_CONNECTION_STRING: ${{ secrets.ACS_CONNECTION_STRING }}
          ACS_SENDER_ADDRESS: ${{ secrets.ACS_SENDER_ADDRESS }}
          ALLOWED_EXTENSION_ORIGINS: ${{ secrets.ALLOWED_EXTENSION_ORIGINS }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          GEMINI_SYSTEM_PROMPT: ${{ secrets.GEMINI_SYSTEM_PROMPT }}

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r
        working-directory: ./bantAI-backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./bantAI-backend/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_992847292C724EECA5AACBCF3DB1CEF1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_553ECE2527EA4F649673A91635B2A276 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_43508776D60944F796A5A8E0B04F1A16 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BantAI-Buddy-Alert-Service'
          slot-name: 'Production'
          package: .

      - name: Post-deploy health smoke check
        run: node scripts/health-check.js
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
          